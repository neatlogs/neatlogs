name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install black isort pytest pytest-asyncio pytest-mock respx httpx numpy

      - name: Format (black)
        run: black --check neatlogs tests/unit

      - name: Imports (isort)
        run: isort --check-only neatlogs tests/unit

      - name: Unit tests
        run: pytest -q tests/unit
