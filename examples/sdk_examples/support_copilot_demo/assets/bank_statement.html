<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; padding: 24px; background: #fafafa; }
    h2 { color: #2454ff; margin-bottom: 16px; }
    table { width: 540px; border-collapse: collapse; background: white; border: 1px solid #e2e2e2; border-radius: 8px; overflow: hidden; }
    th, td { padding: 12px 16px; text-align: left; font-size: 14px; border-bottom: 1px solid #f1f1f1; }
    th { background: #f7f7f7; color: #555; }
    .highlight { background: #fff7e6; font-weight: 600; }
    .amount { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h2>Recent transactions — card ending 4242</h2>
  <table>
    <thead><tr><th>Date</th><th>Description</th><th class="amount">Amount</th></tr></thead>
    <tbody>
      <tr><td>04/12</td><td>NETFLIX.COM</td><td class="amount">$15.99</td></tr>
      <tr class="highlight"><td>04/14</td><td>ACME CORP</td><td class="amount">$89.99</td></tr>
      <tr><td>04/15</td><td>STARBUCKS #2031</td><td class="amount">$6.40</td></tr>
      <tr><td>04/16</td><td>UBER TRIP</td><td class="amount">$22.10</td></tr>
    </tbody>
  </table>
</body>
</html>
