<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; padding: 0; background: #fafafa; }
    .browser { background: white; border: 1px solid #d2d2d2; border-radius: 8px; margin: 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .url-bar { background: #f1f1f1; padding: 8px 12px; border-bottom: 1px solid #d2d2d2; font-family: -apple-system, monospace; color: #555; font-size: 13px; }
    .content { padding: 32px; max-width: 600px; }
    .brand { color: #2454ff; font-weight: 700; font-size: 16px; margin-bottom: 8px; }
    h1 { font-size: 24px; margin: 0 0 8px 0; }
    .meta { color: #777; font-size: 13px; margin-bottom: 20px; }
    p { line-height: 1.6; color: #1a1a1a; }
    strong { background: #fff7e6; padding: 0 4px; }
  </style>
</head>
<body>
  <div class="browser">
    <div class="url-bar">https://neatlogs.github.io/support-copilot-demo-kb/kb/refund-policy-v2.1.html</div>
    <div class="content">
      <div class="brand">ACME Help Center</div>
      <h1>Refund Policy</h1>
      <div class="meta">Last updated February 18, 2026</div>
      <p>If you are not satisfied with your purchase, you may request a refund within
        <strong>30 days</strong> of the original transaction date.</p>
    </div>
  </div>
</body>
</html>
