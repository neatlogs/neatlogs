[pytest]
# Pytest configuration for Neatlogs

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Default to unit tests only (integration tests live in tests/integration)
testpaths = tests/unit

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
